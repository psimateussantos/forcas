name: Lembretes Forcas

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      teste:
        description: "Enviar push de teste imediato"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: lembretes
  cancel-in-progress: false

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install web-push@3 --no-save
      - run: node scripts/enviar.js
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
          TESTE: ${{ github.event.inputs.teste }}
      - name: Salvar estado antiduplicacao
        run: |
          if [ -f .estado_mudou ]; then
            git config user.name "forcas-bot"
            git config user.email "actions@users.noreply.github.com"
            git add estado.json
            git commit -m "Registra lembrete enviado" || true
            git pull --rebase origin ${GITHUB_REF_NAME} || true
            git push
          fi
